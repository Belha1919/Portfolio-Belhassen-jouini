<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a12;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:0.15" />
      <stop offset="70%" style="stop-color:#00FF88;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  
  <!-- Glow effect -->
  <circle cx="200" cy="200" r="200" fill="url(#glowGrad)"/>
  
  <!-- Avatar silhouette -->
  <circle cx="200" cy="150" r="55" fill="#00FF88" opacity="0.15"/>
  <path d="M 120 280 Q 120 220, 200 220 Q 280 220, 280 280 L 280 320 Q 280 340, 260 340 L 140 340 Q 120 340, 120 320 Z" fill="#00FF88" opacity="0.15"/>
  
  <!-- Accent circles -->
  <circle cx="200" cy="150" r="58" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.08"/>
  
  <!-- Text placeholder -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="18" fill="#00FF88" opacity="0.3" text-anchor="middle" dominant-baseline="middle" font-weight="600">BJ</text>
</svg>